name: Preview Deployment
on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Deploy Convex Preview
        id: convex_deploy
        run: |
          output=$(bunx convex deploy --preview-create pr-${{ github.event.number }} 2>&1)
          echo "$output"
          url=$(echo "$output" | grep -oE 'https://[a-z0-9-]+\.convex\.cloud' | head -1)
          if [ -z "$url" ]; then
            echo "::error::Could not extract Convex deployment URL from output"
            exit 1
          fi
          echo "deployment_url=$url" >> "$GITHUB_OUTPUT"
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}

      - name: Comment deployment URL on PR
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          message: |
            ### 🚀 Convex Preview Deployment
            **URL:** ${{ steps.convex_deploy.outputs.deployment_url }}